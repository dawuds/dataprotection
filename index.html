<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Protection Explorer</title>
  <meta name="description" content="Interactive GRC reference for technical data protection — DLP, encryption, key management, data classification, backup & recovery, and secure disposal controls.">
  <meta property="og:title" content="Data Protection Explorer">
  <meta property="og:description" content="Technical data protection controls covering DLP, encryption, key management, database security, data masking, and secure disposal aligned to NIST 800-53, PCI DSS, ISO 27001, and BNM RMiT.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header" id="site-header" role="banner">
    <div class="header-inner">
      <a href="#" class="header-brand" title="Home">
        <h1>Data Protection Explorer</h1>
        <span class="header-subtitle">Technical Data Protection Controls</span>
      </a>
      <div class="header-search">
        <input type="text" id="search-input" placeholder="Search controls, technologies, frameworks..." aria-label="Search compliance data" autocomplete="off">
      </div>
    </div>
  </header>
  <nav class="nav" id="site-nav" role="navigation" aria-label="Main navigation">
    <div class="nav-inner">
      <a href="#overview" class="nav-link active" data-view="overview">Overview</a>
      <a href="#framework" class="nav-link" data-view="framework">Framework</a>
      <a href="#controls" class="nav-link" data-view="controls">Controls</a>
      <a href="#risk" class="nav-link" data-view="risk">Risk Management</a>
      <a href="#technologies" class="nav-link" data-view="technologies">Technologies</a>
      <a href="#reference" class="nav-link" data-view="reference">Reference</a>
      <div class="nav-actions">
        <button class="btn-export" id="btn-pdf">PDF</button>
        <button class="btn-export" id="btn-csv">CSV</button>
      </div>
    </div>
  </nav>
  <main id="app" role="main">
    <noscript>This application requires JavaScript.</noscript>
    <div class="loading">
      <div class="spinner"></div>
      <span>Loading data protection controls...</span>
    </div>
  </main>
  <footer role="contentinfo"></footer>
  <script src="app.js"></script>
</body>
</html>
